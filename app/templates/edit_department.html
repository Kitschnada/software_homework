{% extends "layout.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>⚙️ 编辑部门信息</h2>
        <a href="{{ url_for('admin_dashboard') }}" class="btn-outline" style="padding: 8px 18px;">← 返回</a>
    </div>

    <div class="card">
        <form action="{{ url_for('edit_department', dept_id=dept.id) }}" method="post">
            <div style="display: flex; gap: 20px; margin-bottom: 18px;">
                <div style="flex: 2;">
                    <label>部门名称 <span class="text-red">*</span></label>
                    <input type="text" name="name" value="{{ dept.name }}" required>
                </div>
                <div style="flex: 1;">
                    <label>部门代码 <span class="text-red">*</span></label>
                    <input type="text" name="code" value="{{ dept.code }}" required
                        {% if dept.code == 'MEDIA' %}readonly title="核心部门代码不可修改"{% endif %}>
                </div>
            </div>

            <div class="form-group">
                <label>负责人</label>
                <input type="text" name="head_name" value="{{ dept.head_name or '' }}" placeholder="部门负责人姓名">
            </div>

            <div style="display: flex; gap: 20px; margin-bottom: 24px;">
                <div style="flex: 1;">
                    <label>联系电话</label>
                    <input type="text" name="phone" value="{{ dept.phone or '' }}" placeholder="手机号码">
                </div>
                <div style="flex: 1;">
                    <label>QQ号码</label>
                    <input type="text" name="qq" value="{{ dept.qq or '' }}" placeholder="QQ号">
                </div>
            </div>

            <div style="display: flex; gap: 12px;">
                <button type="submit" style="padding: 10px 28px;">保存修改</button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn-ghost" style="padding: 10px 18px; text-decoration: none; display: inline-flex; align-items: center;">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

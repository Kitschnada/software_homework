{% extends "layout.html" %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2>编辑工单 (ID: {{ order.id }})</h2>
    <div class="section">
        <form action="{{ url_for('edit_order', order_id=order.id) }}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>联系方式:</label>
                <input type="text" name="contact" value="{{ order.contact }}" required>
            </div>
            <div class="form-group">
                <label>截止日期:</label>
                <input type="date" name="deadline" value="{{ order.deadline }}" required>
            </div>
            <div class="form-group">
                <label>需求描述:</label>
                <textarea name="requirements" rows="5" required>{{ order.requirements }}</textarea>
            </div>
            
            <div class="form-group" style="margin-top: 15px; padding: 10px; background: #f9f9f9; border: 1px dashed #ccc;">
                <label>附件管理:</label>
                <p style="font-size: 13px; color: #666; margin: 5px 0;">
                    当前附件: 
                    {% if order.attachment_path %}
                        <a href="{{ url_for('static', filename='uploads/' + order.attachment_path) }}" target="_blank">点击查看</a>
                    {% else %}
                        无
                    {% endif %}
                </p>
                <label for="new_file" style="font-weight: normal; font-size: 13px;">更换附件 (如不修改请留空):</label>
                <input type="file" name="attachment" id="new_file">
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn-primary">保存修改</button>
                <a href="{{ url_for('applicant_dashboard') }}" class="btn-danger" style="background-color: #6c757d; text-decoration: none; padding: 5px 10px; font-size: 14px;">返回</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 30px auto;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
        <h2>👤 个人信息维护</h2>
        <span style="color: #999; font-size: 14px;">UID: {{ user.uid }}</span>
    </div>

    <form method="post" class="profile-form">
        
        <div class="section-box" style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee;">
            <h4 style="margin-top: 0; color: #666; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px;">
                🔒 身份验证信息 (不可修改)
            </h4>
            
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label style="font-weight: bold; color: #555;">真实姓名</label>
                    <input type="text" value="{{ user.real_name }}" disabled 
                           style="width: 100%; padding: 8px; background: #e9ecef; border: 1px solid #ced4da; color: #495057; cursor: not-allowed;">
                    <small style="color: #999; display: block; margin-top: 5px;">用于线下身份核验</small>
                </div>
                
                <div style="flex: 1;">
                    <label style="font-weight: bold; color: #555;">一卡通号</label>
                    <input type="text" value="{{ user.card_id }}" disabled 
                           style="width: 100%; padding: 8px; background: #e9ecef; border: 1px solid #ced4da; color: #495057; cursor: not-allowed;">
                </div>
                
                <div style="flex: 1;">
                    <label style="font-weight: bold; color: #555;">所属部门</label>
                    <input type="text" value="{{ user.dept_name }}" disabled 
                           style="width: 100%; padding: 8px; background: #e9ecef; border: 1px solid #ced4da; color: #495057; cursor: not-allowed;">
                </div>
            </div>
        </div>

        <div class="section-box" style="padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
            <h4 style="margin-top: 0; color: #007bff; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                ✏️ 账户设置 (可修改)
            </h4>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold;">个性昵称</label>
                <input type="text" name="nickname" value="{{ user.nickname or '' }}" placeholder="设置一个好记的昵称，可用于登录"
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <small style="color: #666;">注意：这是您的登录别名，不是真实姓名。</small>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold;">手机号码</label>
                <input type="text" name="phone" value="{{ user.phone }}" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <small style="color: #666;">用于接收工单通知或登录。</small>
            </div>

            <div class="form-group" style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc;">
                <label style="font-weight: bold;">修改密码 <span style="font-weight: normal; color: #999;">(若不修改请留空)</span></label>
                <input type="password" name="new_password" placeholder="请输入新密码"
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 20px; width: 100%; padding: 12px; font-size: 16px;">保存所有更改</button>
        </div>

    </form>
</div>
{% endblock %}

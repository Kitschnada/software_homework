{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>👤 个人信息维护</h2>
        <span class="font-mono text-muted text-sm">UID: {{ user.uid }}</span>
    </div>

    <form method="post">
        <!-- 不可修改信息 -->
        <div class="card" style="background: var(--bg-section);">
            <h4>🔒 身份验证信息 <span class="text-muted" style="font-weight: 400;">(不可修改)</span></h4>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label class="text-xs">真实姓名</label>
                    <input type="text" value="{{ user.real_name }}" disabled>
                    <p class="text-xs text-muted" style="margin: 4px 0 0;">用于线下身份核验</p>
                </div>
                <div style="flex: 1;">
                    <label class="text-xs">一卡通号</label>
                    <input type="text" value="{{ user.card_id }}" disabled>
                </div>
                <div style="flex: 1;">
                    <label class="text-xs">所属部门</label>
                    <input type="text" value="{{ user.dept_name }}" disabled>
                </div>
            </div>
        </div>

        <!-- 可修改信息 -->
        <div class="card">
            <h4 style="color: var(--primary);">✏️ 账户设置 <span class="text-muted" style="font-weight: 400;">(可修改)</span></h4>

            <div class="form-group">
                <label>个性昵称</label>
                <input type="text" name="nickname" value="{{ user.nickname or '' }}" placeholder="设置一个好记的昵称，可用于登录">
                <p class="text-xs text-muted" style="margin: 4px 0 0;">这是您的登录别名，不是真实姓名。</p>
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>手机号码</label>
                    <input type="text" name="phone" value="{{ user.phone }}" required>
                    <p class="text-xs text-muted" style="margin: 4px 0 0;">用于接收工单通知或登录。</p>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label>绑定的 QQ 号 <span class="text-muted" style="font-weight: 400;">(接单必填)</span></label>
                    <input type="text" name="qq_number" value="{{ user.qq_number or '' }}" placeholder="机器人会向此号私聊及通知">
                    <p class="text-xs text-muted" style="margin: 4px 0 0;">参与 QQ 群抢单时需校验此号码。</p>
                </div>
            </div>

            <div class="form-group" style="margin-top: 28px; padding-top: 20px; border-top: 1px dashed var(--border-light);">
                <label>修改密码 <span class="text-muted" style="font-weight: 400;">(不修改请留空)</span></label>
                <input type="password" name="new_password" placeholder="请输入新密码">
            </div>

            <button type="submit" style="width: 100%; margin-top: 20px; height: 44px; font-size: 15px; border-radius: var(--radius-md);">
                保存所有更改
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% extends "layout.html" %}

{% block content %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/zh-cn.js'></script>

<div style="max-width: 1000px; margin: 0 auto;">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">📅 日程排期看板</h2>
            <div class="text-sm" style="display: flex; align-items: center; gap: 16px;">
                <span style="display: flex; align-items: center; gap: 5px;">
                    <span style="width: 12px; height: 12px; background: var(--accent-amber); border-radius: 3px;"></span> 待接单
                </span>
                <span style="display: flex; align-items: center; gap: 5px;">
                    <span style="width: 12px; height: 12px; background: var(--primary); border-radius: 3px;"></span> 制作中
                </span>
            </div>
        </div>
        <div id="calendar"></div>
    </div>
</div>

<script id="events-data" type="application/json">
    {{ events | tojson | safe }}
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var eventsData = JSON.parse(document.getElementById('events-data').textContent);

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-cn',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,listWeek'
            },
            events: eventsData,
            eventClick: function(info) {
                alert('工单 ID: #' + info.event.id + '\n简述: ' + info.event.title + '\n截止日: ' + info.event.startStr);
            }
        });
        calendar.render();
    });
</script>

<style>
    .fc { font-family: inherit; }
    .fc .fc-toolbar-title { font-size: 18px; font-weight: 600; }
    .fc .fc-button { background: var(--primary); border: none; font-size: 13px; }
    .fc .fc-button:hover { background: var(--primary-dark); }
    .fc .fc-button-active { background: var(--primary-dark) !important; }
    .fc .fc-day-today { background: var(--primary-bg) !important; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border-light); }
</style>
{% endblock %}

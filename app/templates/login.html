{% extends "layout.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #007bff; border: none;">账号登录</h2>
    
    <form method="post" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>账户类型:</label>
            <select name="role" required style="border: 2px solid #eee;">
                <option value="applicant">一般账户 (Applicant)</option>
                <option value="acceptor">成员账户 (Acceptor)</option>
                <option value="dept_admin">管理员账户 (Dept Admin)</option>
                <option value="admin">系统管理员账户 (System Admin)</option>
            </select>
        </div>

        <div class="form-group">
            <label>账户名称:</label>
            <input type="text" name="identifier" placeholder="请输入识别码 / 一卡通 / 手机号 / 昵称" required>
        </div>

        <div class="form-group">
            <label>登录密码:</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>

        <button type="submit" style="width: 100%; height: 45px; margin-top: 10px; background: #007bff; font-size: 18px;">
            立即登录
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #666;">
        没有账号？ <a href="{{ url_for('register') }}" style="color: #007bff; text-decoration: none;">申请注册</a>
    </p>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block content %}
<div style="max-width: 420px; margin: 40px auto;">
    <div class="card" style="padding: 36px 32px;">
        <div style="text-align: center; margin-bottom: 28px;">
            <div style="width: 56px; height: 56px; margin: 0 auto 14px; background: linear-gradient(135deg, var(--primary), #7c3aed); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 24px;">
                🔐
            </div>
            <h2 style="text-align: center; margin: 0;">账号登录</h2>
            <p class="text-sm text-muted" style="margin: 6px 0 0;">吴健雄学院融媒体中心工单系统</p>
        </div>

        <form method="post" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>账户名称</label>
                <input type="text" name="identifier" placeholder="识别码 / 一卡通 / 手机号 / 昵称" required>
            </div>
            <div class="form-group">
                <label>登录密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" style="width: 100%; height: 44px; margin-top: 8px; font-size: 15px; border-radius: var(--radius-md);">
                立即登录
            </button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 14px;">
            <span class="text-muted">没有账号？</span>
            <a href="{{ url_for('register') }}" class="text-primary" style="text-decoration: none; font-weight: 600;">申请注册</a>
        </p>
    </div>
</div>
{% endblock %}

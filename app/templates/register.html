{% extends "layout.html" %}
{% block content %}
<div style="max-width: 420px; margin: 30px auto;">
    <div class="card" style="padding: 36px 32px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <h2 style="text-align: center; margin: 0;">📋 账户注册</h2>
            <p class="text-sm text-muted" style="margin: 6px 0 0;">请填写真实信息，提交后等待管理员审核</p>
        </div>

        <form method="post">
            <div class="form-group">
                <label>一卡通号 <span class="text-red text-xs">*</span></label>
                <input type="text" name="card_id" required placeholder="请输入一卡通号">
            </div>
            <div class="form-group">
                <label>真实姓名 <span class="text-red text-xs">*</span></label>
                <input type="text" name="real_name" required placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label>手机号 <span class="text-red text-xs">*</span></label>
                <input type="text" name="phone" required placeholder="用于接收通知">
            </div>
            <div class="form-group">
                <label>密码 <span class="text-red text-xs">*</span></label>
                <input type="password" name="password" required placeholder="设置登录密码">
            </div>
            <div class="form-group">
                <label>注册身份</label>
                <select name="role" id="roleSelect" onchange="toggleDept()" required>
                    <option value="applicant">工单申请者 (各部门)</option>
                    <option value="acceptor">工单接单员 (融媒体中心)</option>
                </select>
            </div>
            <div class="form-group" id="deptGroup">
                <label>所属部门</label>
                <select name="department_id">
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" style="width: 100%; height: 44px; margin-top: 8px; font-size: 15px; border-radius: var(--radius-md);">
                提交注册
            </button>
        </form>

        <p style="text-align: center; margin-top: 16px; font-size: 14px;">
            <span class="text-muted">已有账号？</span>
            <a href="{{ url_for('login') }}" class="text-primary" style="text-decoration: none; font-weight: 600;">去登录</a>
        </p>
    </div>
</div>
<script>
    function toggleDept() {
        var role = document.getElementById('roleSelect').value;
        document.getElementById('deptGroup').style.display = role === 'acceptor' ? 'none' : 'block';
    }
</script>
{% endblock %}

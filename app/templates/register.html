{% extends "layout.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2 style="text-align: center;">账户注册</h2>
    <form method="post">
        <div class="form-group">
            <label>一卡通号</label>
            <input type="text" name="card_id" required placeholder="请输入一卡通号">
        </div>
        <div class="form-group">
            <label>真实姓名</label>
            <input type="text" name="real_name" required placeholder="请输入真实姓名">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" name="phone" required placeholder="用于接收通知">
        </div>
        
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        
        <div class="form-group">
            <label>注册身份</label>
            <select name="role" id="roleSelect" onchange="toggleDept()" required style="width: 100%; padding: 8px;">
                <option value="applicant">工单申请者 (各部门)</option>
                <option value="acceptor">工单接单员 (融媒体中心)</option>
            </select>
        </div>
        
        <div class="form-group" id="deptGroup">
            <label>所属部门</label>
            <select name="department_id" style="width: 100%; padding: 8px;">
                {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">提交注册</button>
    </form>
    
    <script>
        function toggleDept() {
            var role = document.getElementById('roleSelect').value;
            var deptGroup = document.getElementById('deptGroup');
            // 如果是接单员，后端会自动绑定融媒体中心，前端可以隐藏部门选择，或者禁用
            if (role === 'acceptor') {
                deptGroup.style.display = 'none';
            } else {
                deptGroup.style.display = 'block';
            }
        }
    </script>
</div>
{% endblock %}

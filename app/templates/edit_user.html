{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>✏️ 编辑用户信息</h2>
        <span class="font-mono text-muted text-sm">UID: {{ user.uid }}</span>
    </div>

    <form action="{{ url_for('edit_user', user_id=user.id) }}" method="post">

        <!-- Identity -->
        <div class="card">
            <h4 style="color: var(--accent-red);">🛡️ 核心身份信息 <span class="text-muted" style="font-weight: 400;">(慎重修改)</span></h4>

            <div style="display: flex; gap: 20px; margin-bottom: 18px;">
                <div style="flex: 1;">
                    <label>真实姓名 <span class="text-red">*</span></label>
                    <input type="text" name="real_name" value="{{ user.real_name }}" required>
                </div>
                <div style="flex: 1;">
                    <label>一卡通号 <span class="text-red">*</span></label>
                    <input type="text" name="card_id" value="{{ user.card_id }}" required>
                </div>
            </div>

            <div style="display: flex; gap: 20px; margin-bottom: 18px;">
                <div class="form-group" style="flex: 1;">
                    <label>手机号码 <span class="text-red">*</span></label>
                    <input type="text" name="phone" value="{{ user.phone }}" required>
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label>绑定的 QQ 号 <span class="text-muted" style="font-weight: 400;">(接单必选)</span></label>
                    <input type="text" name="qq_number" value="{{ user.qq_number or '' }}">
                </div>
            </div>
        </div>

        <!-- Permissions -->
        <div class="card">
            <h4 style="color: var(--primary);">⚙️ 账户权限设置</h4>

            <div style="display: flex; gap: 20px; margin-bottom: 18px;">
                <div style="flex: 1;">
                    <label>用户角色</label>
                    <select name="role" style="height: 40px;">
                        <option value="applicant" {% if user.role == 'applicant' %}selected{% endif %}>工单申请者</option>
                        <option value="acceptor" {% if user.role == 'acceptor' %}selected{% endif %}>工单接单员</option>
                        {% if session.role == 'admin' %}
                        <option value="dept_admin" {% if user.role == 'dept_admin' %}selected{% endif %}>部门管理员</option>
                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>系统管理员</option>
                        {% endif %}
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>所属部门</label>
                    {% if session.role == 'admin' %}
                    <select name="department_id" style="height: 40px;">
                        {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if user.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                    {% else %}
                    <input type="text" value="{{ user.dept_name }}" disabled>
                    <input type="hidden" name="department_id" value="{{ user.department_id }}">
                    {% endif %}
                </div>
            </div>
        </div>

        <!-- Other -->
        <div class="card">
            <h4>📝 其他信息</h4>

            <div class="form-group">
                <label>个性昵称</label>
                <input type="text" name="nickname" value="{{ user.nickname or '' }}" placeholder="自定义昵称">
            </div>

            <div class="form-group" style="padding-top: 18px; border-top: 1px dashed var(--border-light);">
                <label>重置密码 <span class="text-muted" style="font-weight: 400;">(不修改请留空)</span></label>
                <input type="password" name="password" placeholder="输入新密码以强制重置">
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button type="submit" style="padding: 10px 28px;">保存所有更改</button>
            <a href="{{ url_for('manage_users') }}" class="btn-ghost" style="padding: 10px 18px; text-decoration: none; display: inline-flex; align-items: center;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
